name: Build & Release EXE

on:
  push:
    tags:
      - 'v*'          # triggers on any tag like v1.0.0, v1.2.3

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements_engineer.txt

      - name: Inject version from tag
        shell: pwsh
        run: |
          $tag = '${{ github.ref_name }}'.TrimStart('v')
          $parts = $tag.Split('.')
          $major = [int]$parts[0]; $minor = [int]$parts[1]; $patch = [int]$parts[2]

          # Patch VERSION constant in ai_engineer.py
          $src = Get-Content ai_engineer.py -Raw
          $src = $src -replace 'VERSION\s*=\s*"[^"]+"', "VERSION     = `"$tag`""
          Set-Content ai_engineer.py $src -NoNewline

          # Patch engineer_version.txt (Windows EXE metadata)
          $ver = Get-Content engineer_version.txt -Raw
          $ver = $ver -replace 'filevers=\(\d+, \d+, \d+, \d+\)', "filevers=($major, $minor, $patch, 0)"
          $ver = $ver -replace 'prodvers=\(\d+, \d+, \d+, \d+\)', "prodvers=($major, $minor, $patch, 0)"
          $ver = $ver -replace "FileVersion', u'[\d.]+'",   "FileVersion', u'$tag.0'"
          $ver = $ver -replace "ProductVersion', u'[\d.]+'", "ProductVersion', u'$tag.0'"
          Set-Content engineer_version.txt $ver -NoNewline

      - name: Build EXE
        run: python -m PyInstaller engineer.spec --noconfirm

      - name: Upload EXE to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/NeuralRacingPerformance.exe
          body: |
            ## Neural Racing Performance ${{ github.ref_name }}

            **Download NeuralRacingPerformance.exe below — no Python or setup required.**

            ### First run
            1. Download and run `NeuralRacingPerformance.exe`
            2. Create a free account in the setup wizard
            3. Fill in your race plan details
            4. Start iRacing, then press Start in the engineer

            ### Requirements
            - Windows 10/11
            - iRacing
            - Microphone (for voice input)
            - Free OpMo account (created in-app — no API keys needed)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
